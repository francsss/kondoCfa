services:
  postgres:
    image: postgres:16-alpine
    container_name: kondo-v1-clean-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: kondo
      POSTGRES_PASSWORD: kondo_password
      POSTGRES_DB: kondo_v1_clean
    ports:
      - "5432:5432"
    volumes:
      - kondo_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kondo -d kondo_v1_clean"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  kondo_postgres_data:
